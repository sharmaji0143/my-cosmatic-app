<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmetic Inventory</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <h2>💄 कॉस्मेटिक स्टॉक मैनेजर</h2>
        
        <div class="input-section">
            <input type="text" id="itemName" placeholder="प्रोडक्ट का नाम (जैसे: Lipstick)">
            <input type="number" id="itemQty" placeholder="मात्रा (Qty)">
            <input type="number" id="itemPrice" placeholder="कीमत (Price)">
            <button onclick="addItem()">स्टॉक में जोड़ें</button>
        </div>

        <div class="inventory-list">
            <h3>मौजूदा स्टॉक</h3>
            <table id="stockTable">
                <thead>
                    <tr>
                        <th>नाम</th>
                        <th>मात्रा</th>
                        <th>कीमत</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="inventoryBody">
                    </tbody>
            </table>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
